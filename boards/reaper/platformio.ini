[env:reaper]
board = reaper
board_build.partitions = support_files/custom_16Mb.csv
build_src_filter =${env.build_src_filter} +<../boards/reaper>
build_flags =
	${env.build_flags}
	-Iboards/reaper
    -DOTA_TAG='"reaper_bruce"'
	-Os
	-D ARDUINO_USB_MODE=1
	-D CORE_DEBUG_LEVEL=5
    -D USE_HSPI_PORT=1

    # TFT_eSPI display
    -D HAS_SCREEN=1
    -D ROTATION=1

    -D USER_SETUP_LOADED=1
    -D ST7789_DRIVER=1
    -D TFT_RGB_ORDER=0
    -D TFT_WIDTH=170
    -D TFT_HEIGHT=320
    -D TFT_BACKLIGHT_ON=1
    -D TFT_BL=6
    -D TFT_RST=16
    -D TFT_DC=15
    -D TFT_MISO=8
    -D TFT_MOSI=18
    -D TFT_SCLK=17
    -D TFT_CS=7
    -D TFT_IPS=1
    -D TFT_COL_OFS1=35
    -D TFT_ROW_OFS1=0
    -D TFT_COL_OFS2=35
    -D TFT_ROW_OFS2=0

    # SD CARD
    -D SDCARD_CS=3
    -D SDCARD_SCK=17
    -D SDCARD_MISO=8
    -D SDCARD_MOSI=18

    # BUTTONS
    -D HAS_BTN=1
    -D BTN_ALIAS="\"OK\""
    -D HAS_5_BUTTONS=1
    -D SEL_BTN=0
    -D UP_BTN=41
    -D DW_BTN=40
    -D R_BTN=38
    -D L_BTN=39
    -D ESC_BTN=21
    -D BTN_ACT=LOW


