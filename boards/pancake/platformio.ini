; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

##################################### Pancake (ESP32-C5 + 3.5" ST7796 + FT6336 cap touch) ####################################################
[env:pancake]
board = esp32-c5-devkitc-1
board_build.partitions = support_files/custom_16Mb.csv
build_src_filter = ${env.build_src_filter} +<../boards/pancake>
build_flags =
	${env.build_flags}
	-Iboards/pancake
	-DDEVICE_NAME='"Pancake"'
	-DOTA_TAG='"pancake"'
	-DPANCAKE=1
	-DDONT_USE_INPUT_TASK=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1

	-DROTATION=0
	-DHAS_BTN=0
	-DSEL_BTN=-1
	-DUP_BTN=-1
	-DDW_BTN=-1
	-DBTN_ACT=LOW
	-DBTN_ALIAS='"Sel"'

	-DFP=1
	-DFM=2
	-DFG=3

	; TFT — ST7796 3.5" 320x480, shared SPI bus with SD card
	-DHAS_TOUCH=1
	-DST7796_DRIVER=1
	-DTFT_WIDTH=320
	-DTFT_HEIGHT=480
	-DTFT_INVERSION_ON=1
	-DTFT_MISO=4
	-DTFT_MOSI=24
	-DTFT_SCLK=23
	-DTFT_CS=5
	-DTFT_DC=3
	-DTFT_RST=2
	-DTFT_BL=26
	-DTOUCH_CS=-1
	-D GFX_BL=26
	-D TFT_IPS=0
	-D TFT_COL_OFS1=0
	-D TFT_ROW_OFS1=0
	-D TFT_COL_OFS2=0
	-D TFT_ROW_OFS2=0

	; Backlight PWM
	-DTFT_BRIGHT_CHANNEL=0
	-DTFT_BRIGHT_Bits=8
	-DTFT_BRIGHT_FREQ=5000
	-DDIMMER_SETUP=60

	; FT6336 capacitive touch — I2C, shared bus with MAX17048 fuel gauge
	-DHAS_CAPACITIVE_TOUCH=1
	-DTOUCH_FT6336=1
	-DTOUCH_SDA=9
	-DTOUCH_SCL=10
	-DTOUCH_RST=8
	-DTOUCH_INT=25

	; SD card — shares SPI bus with TFT
	-DBOARD_HAS_TF=1
	-DSDCARD_CS=7
	-DSDCARD_SCK=TFT_SCLK
	-DSDCARD_MISO=TFT_MISO
	-DSDCARD_MOSI=TFT_MOSI

lib_ignore =
	SensorLib
	XPowersLib
