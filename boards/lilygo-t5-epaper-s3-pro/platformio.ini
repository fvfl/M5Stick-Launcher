; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[env:lilygo-t5-epaper-s3-pro]
board = lilygo-t5-epaper-s3-pro
board_build.partitions = support_files/custom_16Mb.csv
build_src_filter =${env.build_src_filter} +<../boards/lilygo-t5-epaper-s3-pro>
build_flags =
	${env.build_flags}
	-Iboards/lilygo-t5-epaper-s3-pro
	-DDISABLE_OTA

	-DARDUINO_USB_CDC_ON_BOOT=1


    -DROTATION=0 # 0,2 Portrait, 1,3 to landscape
    -DHAS_BTN=1
    -DSEL_BTN=0
	-DUP_BTN=-1
	-DDW_BTN=48
	-DBTN_ACT=LOW
	-DBTN_ALIAS='"Sel"'
	-DMINBRIGHT=190
	-DBACKLIGHT=40
	-DLED=-1
	-DLED_ON=HIGH

	-DFP=3
	-DFM=4
	-DFG=5

	#-DLH=14
	#-DLW=11

	-DHAS_TOUCH=1

	-DTFT_WIDTH=540
	-DTFT_HEIGHT=960

	-DSDCARD_CS=16
	-DSDCARD_SCK=18
	-DSDCARD_MISO=8
	-DSDCARD_MOSI=17

	; Use EPD_Painter as the display backend for this board.
	-DUSE_EPD_PAINTER=1

	; Keep the older epdiy path disabled for this environment.
	;-DUSE_EPDIY=1
	;-DEPD_BOARD_DEFINITION=epd_board_lilygo_t5_s3
	;-DEPD_DISPLAY_DEFINITION=ED047TC2
	;-DEPDIY_RENDER_I80=1

lib_deps =
	${env.lib_deps}
	adafruit/Adafruit GFX Library @ ^1.12.1
	; epdiy intentionally disabled here in favor of EPD_Painter.
	;https://github.com/bmorcelli/epdiy
	;symlink://C:/Projetos/EPD_Painter
	https://github.com/tonywestonuk/EPD_Painter

lib_ignore =
	GFX Library for Arduino
	lvgl
	GT911 Lite

