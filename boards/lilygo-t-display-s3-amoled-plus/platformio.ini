; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[env:lilygo-t-display-S3-amoled-plus]
board = lilygo-t-display-s3-pro
board_build.partitions = support_files/custom_16Mb.csv
build_src_filter =${env.build_src_filter} +<../boards/lilygo-t-display-s3-amoled-plus>
build_src_flags =
	-DDISABLE_OTA

	-DFP=2
	-DFM=3
	-DFG=4


    -DROTATION=3 # Portrait, 3 to landscape
    -DSEL_BTN=0
	-DBTN_ACT=LOW
	-DBTN_ALIAS='"Sel"'
	-DLED=-1
	-DLED_ON=HIGH
	-DHAS_TOUCH=1

	-DDRIVER_RM67162     		# Configure all registers
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=536
	-D TFT_CS=6
	-D TFT_DC=7
	-D TFT_SCLK=47
	-D TFT_MOSI=18
	-D TFT_MISO=-1
	-D TFT_RST=17
	-D TFT_IPS=0
	-D TFT_COL_OFS1=0
	-D TFT_ROW_OFS1=0
	-D TFT_COL_OFS2=0
	-D TFT_ROW_OFS2=0

	-DSDCARD_CS=11
	-DSDCARD_SCK=14
	-DSDCARD_MISO=13
	-DSDCARD_MOSI=12

lib_deps =
	https://github.com/bmorcelli/Arduino_GFX#lily-amoled-plus
